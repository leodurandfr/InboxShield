[project]
name = "inboxshield-backend"
version = "0.1.0"
description = "InboxShield — Intelligent email management backend"
requires-python = ">=3.12"
dependencies = [
    # Web framework
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    # Database
    "sqlalchemy[asyncio]>=2.0.36",
    "asyncpg>=0.30.0",
    "alembic>=1.14.0",
    # Validation & settings
    "pydantic>=2.10.0",
    "pydantic-settings>=2.6.0",
    # Email
    "imap-tools>=1.7.0",
    "aiosmtplib>=3.0.0",
    # LLM providers
    "ollama>=0.4.0",
    "anthropic>=0.40.0",
    "openai>=1.55.0",
    "mistralai>=1.2.0",
    # Scheduling
    "apscheduler>=3.10.0",
    # HTML parsing
    "beautifulsoup4>=4.12.0",
    "lxml>=5.3.0",
    "html2text>=2024.2.26",
    "mail-parser-reply>=1.0.0",
    "tldextract>=5.1.0",
    # Encryption
    "cryptography>=44.0.0",
    # HTTP client
    "httpx>=0.28.0",
    "email-validator>=2.3.0",
]

[dependency-groups]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["."]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.ruff.lint.per-file-ignores]
# Autogenerated Alembic migrations — long table definitions are fine.
"alembic/versions/*.py" = ["E501", "W291"]
# LLM prompts contain long inline strings intentionally.
"app/llm/prompts.py" = ["E501"]
# Test fixtures frequently embed long sample URLs / HTML.
"tests/test_url_analysis.py" = ["E501"]
# FastAPI routers are imported after app init to avoid circular imports.
"app/main.py" = ["E402"]
# Recovery-bootstrap smoke scripts kept for reference — not part of the app.
"test_session*.py" = ["ALL"]

[tool.ruff.lint.isort]
known-first-party = ["app"]
